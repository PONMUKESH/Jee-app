function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function makeEstimationQuestion() {
  const a = randInt(120, 980), b = randInt(12, 89);
  const real = a * b;
  const correct = real;
  const spread = Math.max(200, Math.round(real * 0.18));
  const opts = new Set([correct]);
  while (opts.size < 4) {
    const off = randInt(-spread, spread);
    const candidate = correct + off;
    if (candidate > 0 && Math.abs(candidate - correct) > spread * 0.15) opts.add(candidate);
  }
  const options = Array.from(opts).sort(() => Math.random() - 0.5);
  return { type: "Estimation", prompt: `Estimate (no writing): ${a} × ${b} ≈ ?`, options, answer: correct };
}

function makePermutationQuestion() {
  const n = randInt(5, 9), r = randInt(2, Math.min(4, n - 1));
  const fact = (x) => (x <= 1 ? 1 : x * fact(x - 1));
  const nPr = fact(n) / fact(n - r);
  const nCr = nPr / fact(r);
  const useC = Math.random() > 0.5;
  const correct = useC ? nCr : nPr;
  const opts = new Set([correct]);
  while (opts.size < 4) {
    const off = randInt(-Math.ceil(correct * 0.4) - 2, Math.ceil(correct * 0.4) + 2);
    const c = correct + off;
    if (c > 0 && c !== correct) opts.add(c);
  }
  const options = Array.from(opts).sort(() => Math.random() - 0.5);
  return {
    type: useC ? "Combination" : "Permutation",
    prompt: `${useC ? "ⁿCᵣ" : "ⁿPᵣ"} for n=${n}, r=${r} = ?`,
    options, answer: correct,
  };
}

function makeProbabilityQuestion() {
  const templates = [
    () => ({ prompt: "Two fair dice rolled — P(sum = 9)?", answer: "1/9", options: ["1/9", "5/36", "1/6", "1/12"] }),
    () => ({ prompt: "Two fair dice rolled — P(sum = 8)?", answer: "5/36", options: ["5/36", "1/6", "1/9", "1/12"] }),
    () => ({ prompt: "Two fair dice rolled — P(sum = 7)?", answer: "1/6", options: ["1/6", "5/36", "1/9", "1/12"] }),
    () => ({ prompt: "Draw 1 card — P(face card)?", answer: "3/13", options: ["3/13", "1/4", "1/13", "4/13"] }),
    () => ({ prompt: "3 fair coins tossed — P(exactly 2 heads)?", answer: "3/8", options: ["3/8", "1/2", "1/4", "1/8"] }),
    () => ({ prompt: "Bag: 4 red, 6 blue — P(red) on 1 draw?", answer: "2/5", options: ["2/5", "3/5", "1/2", "4/10"] }),
  ];
  const pick = templates[randInt(0, templates.length - 1)]();
  const options = [...new Set(pick.options)].sort(() => Math.random() - 0.5);
  return { type: "Probability", prompt: pick.prompt, options, answer: pick.answer };
}

function generateBlitzQuestion() {
  const kind = randInt(0, 2);
  if (kind === 0) return makeEstimationQuestion();
  if (kind === 1) return makePermutationQuestion();
  return makeProbabilityQuestion();
}

function Countdown({ target }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const diff = Math.max(0, target.getTime() - now);
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const Unit = ({ v, label }) => (
    <div style={{ textAlign: "center", flex: 1 }}>
      <div style={{ ...fontMono, fontSize: 26, fontWeight: 700, color: T.text }}>{String(v).padStart(2, "0")}</div>
      <div style={{ ...fontMono, fontSize: 9, color: T.textFaint, letterSpacing: 1 }}>{label}</div>
    </div>
  );
  return (
    <div style={{ display: "flex", marginTop: 14 }}>
      <Unit v={d} label="DAYS" /><Unit v={h} label="HRS" /><Unit v={m} label="MIN" /><Unit v={s} label="SEC" />
    </div>
  );
}

function MentalMathBlitz({ onRoundComplete }) {
  const [q, setQ] = useState(() => generateBlitzQuestion());
  const [timeLeft, setTimeLeft] = useState(10);
  const [running, setRunning] = useState(false);
  const [feedback, setFeedback] = useState(null);
  const [session, setSession] = useState({ correct: 0, total: 0 });

  useEffect(() => {
    if (!running) return;
    if (timeLeft <= 0) { handleAnswer(null); return; }
    const t = setTimeout(() => setTimeLeft((s) => s - 1), 1000);
    return () => clearTimeout(t);
    // eslint-disable-next-line
  }, [running, timeLeft]);

  const start = () => { setSession({ correct: 0, total: 0 }); nextQuestion(); };
  const nextQuestion = () => { setQ(generateBlitzQuestion()); setTimeLeft(10); setFeedback(null); setRunning(true); };

  const handleAnswer = (opt) => {
    if (!running) return;
    const correct = opt === q.answer;
    setFeedback(correct ? "correct" : "wrong");
    setRunning(false);
    setSession((s) => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
    onRoundComplete(correct);
    setTimeout(() => nextQuestion(), 700);
  };

  return (
    <Panel style={{ padding: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionLabel>Mental Math Blitz</SectionLabel>
        <Pill color={T.cyan} border={T.cyan}>{session.correct}/{session.total}</Pill>
      </div>
      <p style={{ ...fontBody, fontSize: 12, color: T.textFaint, marginTop: -4 }}>
        Estimation, probability &amp; P&amp;C — solve mentally, no writing. 10 seconds per question.
      </p>
      {!running && session.total === 0 && feedback === null ? (
        <button onClick={start} style={btnPrimary(T.amber)}><Play size={14} /> Start Blitz</button>
      ) : (
        <div style={{ marginTop: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <Pill color={T.purple} border={T.purple}>{q.type}</Pill>
            <span style={{ ...fontMono, fontSize: 18, fontWeight: 700, color: timeLeft <= 3 ? T.red : T.text }}>{timeLeft}s</span>
          </div>
          <div style={{ ...fontDisplay, fontSize: 16, color: T.text, marginBottom: 12, minHeight: 44 }}>{q.prompt}</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {q.options.map((opt, i) => {
              const isAnswer = opt === q.answer;
              let bg = T.panelAlt, border = T.border, color = T.text;
              if (feedback && isAnswer) { bg = "rgba(74,222,128,0.15)"; border = T.green; color = T.green; }
              return (
                <button key={i} disabled={!running} onClick={() => handleAnswer(opt)} style={{
                  ...fontMono, fontSize: 13, padding: "10px 8px", borderRadius: 10, cursor: running ? "pointer" : "default",
                  background: bg, color, border: `1px solid ${border}`,
                }}>{opt}</button>
              );
            })}
          </div>
        </div>
      )}
    </Panel>
  );
}

function DeepFocusSprint({ onResult }) {
  const [current, setCurrent] = useState(null);
  const [secondsLeft, setSecondsLeft] = useState(8 * 60);
  const [running, setRunning] = useState(false);
  const [result, setResult] = useState(null);
  const intervalRef = useRef(null);
  const currentRef = useRef(null);
  useEffect(() => { currentRef.current = current; }, [current]);

  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        setSecondsLeft((s) => {
          if (s <= 1) {
            clearInterval(intervalRef.current);
            setRunning(false);
            setResult("missed");
            onResult(currentRef.current?.id, false);
            return 0;
          }
          return s - 1;
        });
      }, 1000);
    }
    return () => clearInterval(intervalRef.current);
    // eslint-disable-next-line
  }, [running]);

  const startSprint = () => {
    const q = DEEP_FOCUS_BANK[randInt(0, DEEP_FOCUS_BANK.length - 1)];
    setCurrent(q);
    setSecondsLeft(8 * 60);
    setResult(null);
    setRunning(true);
  };

  const finish = (solved) => {
    clearInterval(intervalRef.current);
    setRunning(false);
    setResult(solved ? "solved" : "missed");
    onResult(current?.id, solved);
  };

  const mm = String(Math.floor(secondsLeft / 60)).padStart(2, "0");
  const ss = String(secondsLeft % 60).padStart(2, "0");

  return (
    <Panel style={{ padding: 16, marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionLabel>Deep Focus Sprint</SectionLabel>
        <Pill color={T.red} border={T.red}>8:00 LIMIT</Pill>
      </div>
      <p style={{ ...fontBody, fontSize: 12, color: T.textFaint, marginTop: -4 }}>
        One ultra-hard, 5-step JEE Advanced question. Beat the clock or log it for review.
      </p>
      {!current ? (
        <button onClick={startSprint} style={btnPrimary(T.red)}><Rocket size={14} /> Launch Sprint</button>
      ) : (
        <div style={{ marginTop: 12 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <Pill color={T.amber} border={T.amber}>{current.subject} · {current.difficulty}</Pill>
            <span style={{ ...fontMono, fontSize: 22, fontWeight: 700, color: secondsLeft < 60 ? T.red : T.text }}>{mm}:{ss}</span>
          </div>
          <div style={{ ...fontBody, fontSize: 13, lineHeight: 1.55, color: T.text, background: T.panelAlt, padding: 12, borderRadius: 10, border: `1px solid ${T.border}` }}>
            {current.prompt}
          </div>
          {!result ? (
            <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
              <button onClick={() => finish(true)} style={btnSecondary(T.green)}><CheckCheck size={14} /> Solved It</button>
              <button onClick={() => finish(false)} style={btnSecondary(T.red)}><XCircle size={14} /> Couldn't Crack It</button>
            </div>
          ) : (
            <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ ...fontBody, fontSize: 12.5, color: result === "solved" ? T.green : T.red }}>
                {result === "solved" ? "Logged as solved — elasticity boosted." : "Logged for review — added to Error Log."}
              </span>
              <button onClick={startSprint} style={{ ...fontMono, fontSize: 11, color: T.textMuted, background: "transparent", border: `1px solid ${T.border}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer" }}>Next →</button>
            </div>
          )}
        </div>
      )}
    </Panel>
  );
}

              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 8 }}>
                <span style={{ ...fontMono, fontSize: 10, color: T.textFaint }}>Stage {e.stage + 1}/{REVIEW_INTERVALS.length} · next {new Date(nextDue).toLocaleDateString()}</span>
                <button onClick={() => markReviewed(e.id)} style={{ ...fontMono, fontSize: 10, color: T.cyan, background: "transparent", border: `1px solid ${T.cyan}`, borderRadius: 8, padding: "4px 8px", cursor: "pointer" }}>Mark revised</button>
              </div>
            </Panel>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================================
   ALERTS — Focus Sessions (distraction notifications) + Revision Queue
   ============================================================================ */
function useNotificationPermission() {
  const [permission, setPermission] = useState(typeof Notification !== "undefined" ? Notification.permission : "unsupported");
  const request = async () => {
    if (typeof Notification === "undefined") return;
    const p = await Notification.requestPermission();
    setPermission(p);
  };
  return { permission, request };
}

function fireNotification(title, body) {
  try {
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      new Notification(title, { body, silent: false, icon: "icon-192.png" });
    }
  } catch (e) { /* Notifications unavailable — in-app banner still covers it */ }
}

function FocusSession({ onDistraction, onSessionEnd }) {
  const [duration, setDuration] = useState(25);
  const [active, setActive] = useState(false);
  const [secondsLeft, setSecondsLeft] = useState(0);
  const [distractions, setDistractions] = useState(0);
  const { permission, request } = useNotificationPermission();
  const intervalRef = useRef(null);
  const activeRef = useRef(active);
  useEffect(() => { activeRef.current = active; }, [active]);

  useEffect(() => {
    const handleVisibility = () => {
      if (activeRef.current && document.hidden) {
        setDistractions((d) => d + 1);
        onDistraction();
        fireNotification("Stay on target 🎯", "You switched away mid focus-session. Come back — the clock's still running.");
      }
    };
    document.addEventListener("visibilitychange", handleVisibility);
    return () => document.removeEventListener("visibilitychange", handleVisibility);
  }, [onDistraction]);

  useEffect(() => {
    if (!active) return;
    intervalRef.current = setInterval(() => {
      setSecondsLeft((s) => {
        if (s <= 1) {
          clearInterval(intervalRef.current);
          setActive(false);
          setDistractions((d) => { fireNotification("Focus session complete ✅", `${duration} minutes logged with ${d} distraction(s).`); onSessionEnd(d); return d; });
          return 0;
        }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(intervalRef.current);
    // eslint-disable-next-line
  }, [active]);

  const start = () => { setSecondsLeft(duration * 60); setDistractions(0); setActive(true); };
  const stop = () => { clearInterval(intervalRef.current); setActive(false); onSessionEnd(distractions); };

  const mm = String(Math.floor(secondsLeft / 60)).padStart(2, "0");
  const ss = String(secondsLeft % 60).padStart(2, "0");

  return (
    <Panel style={{ padding: 16 }}>
      <SectionLabel>Focus Session &amp; Distraction Alerts</SectionLabel>
      <p style={{ ...fontBody, fontSize: 12, color: T.textFaint, marginTop: -4, marginBottom: 10 }}>
        While a session runs, switching tabs or apps is logged as a distraction and (if allowed) triggers a real browser notification.
      </p>
      {permission !== "granted" && permission !== "unsupported" && (
        <button onClick={request} style={{ ...btnPrimary(T.cyan), marginTop: 0, marginBottom: 12 }}><Bell size={14} /> Enable browser notifications</button>
      )}
      {!active ? (
        <>
          <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
            {[15, 25, 45, 60].map((d) => (
              <button key={d} onClick={() => setDuration(d)} style={{
                ...fontMono, fontSize: 11, padding: "6px 10px", borderRadius: 8, cursor: "pointer",
                background: duration === d ? T.amber : "transparent", color: duration === d ? T.bg : T.textMuted,
                border: `1px solid ${duration === d ? T.amber : T.border}`,
              }}>{d}m</button>
            ))}
          </div>
          <button onClick={start} style={btnPrimary(T.amber)}><Play size={14} /> Start {duration}-min session</button>
        </>
      ) : (
        <div>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <span style={{ ...fontMono, fontSize: 26, fontWeight: 700, color: T.text }}>{mm}:{ss}</span>
            <Pill color={distractions > 0 ? T.red : T.green} border={distractions > 0 ? T.red : T.green}>{distractions} distraction{distractions !== 1 ? "s" : ""}</Pill>
          </div>
          <button onClick={stop} style={{ ...btnSecondary(T.red), width: "100%", marginTop: 10 }}><Pause size={14} /> End session</button>
        </div>
      )}
    </Panel>
  );
}

function RevisionQueue({ errors, markReviewed, simDay, advanceDay }) {
  const nowSim = Date.now() + simDay * 86400000;
  const items = errors.map((e) => ({
    ...e,
    nextDue: e.lastReview + REVIEW_INTERVALS[Math.min(e.stage, REVIEW_INTERVALS.length - 1)] * 86400000,
  })).sort((a, b) => a.nextDue - b.nextDue);

  const due = items.filter((i) => i.nextDue <= nowSim);
  const upcoming = items.filter((i) => i.nextDue > nowSim);

  return (
    <Panel style={{ padding: 16, marginTop: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <SectionLabel>Revision Queue</SectionLabel>
        <button onClick={advanceDay} style={{ ...fontMono, fontSize: 10, color: T.textMuted, background: "transparent", border: `1px solid ${T.border}`, borderRadius: 8, padding: "5px 9px", cursor: "pointer", display: "flex", alignItems: "center", gap: 4 }}>
          <FastForward size={12} /> Simulate +1 day
        </button>
      </div>
      <p style={{ ...fontBody, fontSize: 11.5, color: T.textFaint, marginTop: -4 }}>
        Spaced-repetition ladder ({REVIEW_INTERVALS.join("d → ")}d) built from your Error Log. Demo clock is {simDay} day(s) ahead.
      </p>
      <div style={{ marginTop: 10 }}>
        <div style={{ ...fontMono, fontSize: 10, color: T.red, letterSpacing: 1, marginBottom: 6 }}>DUE NOW ({due.length})</div>
        {due.length === 0 && <div style={{ ...fontBody, fontSize: 12, color: T.textFaint, marginBottom: 10 }}>Nothing due — clean slate.</div>}
        {due.map((e) => (
          <div key={e.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "8px 0", borderBottom: `1px solid ${T.border}` }}>
            <div>
              <div style={{ ...fontBody, fontSize: 12.5, color: T.text }}>{e.desc}</div>
              <div style={{ ...fontMono, fontSize: 10, color: T.textFaint }}>{e.chapter} · {e.category}</div>
            </div>
            <button onClick={() => markReviewed(e.id)} style={{ ...fontMono, fontSize: 10, color: T.green, background: "transparent", border: `1px solid ${T.green}`, borderRadius: 8, padding: "4px 8px", cursor: "pointer" }}>Revised</button>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 12 }}>
        <div style={{ ...fontMono, fontSize: 10, color: T.textFaint, letterSpacing: 1, marginBottom: 6 }}>UPCOMING ({upcoming.length})</div>
        {upcoming.slice(0, 5).map((e) => (
          <div key={e.id} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0" }}>
            <span style={{ ...fontBody, fontSize: 12, color: T.textMuted }}>{e.desc.slice(0, 34)}{e.desc.length > 34 ? "…" : ""}</span>
            <span style={{ ...fontMono, fontSize: 10, color: T.textFaint }}>{new Date(e.nextDue).toLocaleDateString()}</span>
          </div>
        ))}
      </div>
    </Panel>
  );
}

function Alerts({ errors, markReviewed, onDistraction, onSessionEnd, simDay, advanceDay }) {
  return (
    <div style={{ padding: 16 }}>
      <SectionLabel>Alerts &amp; Revision Engine</SectionLabel>
      <FocusSession onDistraction={onDistraction} onSessionEnd={onSessionEnd} />
      <RevisionQueue errors={errors} markReviewed={markReviewed} simDay={simDay} advanceDay={advanceDay} />
    </div>
  );
}

/* ============================================================================
   BOTTOM NAV
   ============================================================================ */
function BottomNav({ tab, setTab, dueCount }) {
  const items = [
    { id: "dashboard", label: "Dashboard", icon: LayoutGrid },
    { id: "roadmap", label: "Roadmap", icon: BookOpen },
    { id: "gym", label: "Brain Gym", icon: Zap },
    { id: "errors", label: "Error Log", icon: AlertTriangle },
    { id: "alerts", label: "Alerts", icon: Bell },
  ];
  return (
    <div style={{ display: "flex", background: T.bgElevated, borderTop: `1px solid ${T.border}`, padding: "6px 4px calc(env(safe-area-inset-bottom, 6px))" }}>
      {items.map((it) => {
        const active = tab === it.id;
        return (
          <button key={it.id} onClick={() => setTab(it.id)} style={{
            flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 3, padding: "8px 2px",
            background: "transparent", border: "none", cursor: "pointer", position: "relative",
          }}>
            <it.icon size={18} color={active ? T.amber : T.textFaint} />
            {it.id === "alerts" && dueCount > 0 && (
              <span style={{ position: "absolute", top: 4, right: "28%", width: 7, height: 7, borderRadius: 99, background: T.red }} />
            )}
            <span style={{ ...fontMono, fontSize: 9.5, color: active ? T.amber : T.textFaint }}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ============================================================================
   ROOT APP
   ============================================================================ */
function App() {
  const [tab, setTab] = useState("dashboard");
  const [currentPhaseId, setCurrentPhaseId] = useState("p1");
  const phase = PHASES.find((p) => p.id === currentPhaseId);

  const [completedByPhaseSubject, setCompletedByPhaseSubject] = useState({});
  const toggleChapterDone = useCallback((phaseId, subject, name) => {
    setCompletedByPhaseSubject((prev) => {
      const next = { ...prev };
      next[phaseId] = { ...(next[phaseId] || {}) };
      const set = new Set(next[phaseId][subject] || []);
      set.has(name) ? set.delete(name) : set.add(name);
      next[phaseId][subject] = set;
      return next;
    });
  }, []);

  const [checklist, setChecklist] = useState([
    { id: "c1", text: "30 Physics numericals (mixed difficulty)" },
    { id: "c2", text: "10 Probability / P&C puzzles — Brain Gym" },
    { id: "c3", text: "1 Deep Focus Sprint (8-min hard question)" },
    { id: "c4", text: "Review 3 Error Log entries due today" },
    { id: "c5", text: "1 chapter — Core Path reading" },
  ].map((c) => ({ ...c, done: false })));

  const [blitzStats, setBlitzStats] = useState({ correct: 0, total: 0 });
  const [sprintStats, setSprintStats] = useState({ solved: 0, missed: 0 });
  const [distractionCount, setDistractionCount] = useState(0);
  const [streak, setStreak] = useState(4);

  const [errors, setErrors] = useState([
    { id: "seed1", desc: "Dropped a negative sign integrating over symmetric limits", chapter: "Integrals & Applications", category: "Silly Calculation Error", createdAt: Date.now() - 2 * 86400000, stage: 0, lastReview: Date.now() - 2 * 86400000 },
    { id: "seed2", desc: "Misapplied energy conservation — ignored non-conservative friction term", chapter: "Work, Energy & Power", category: "Conceptual Flaw", createdAt: Date.now() - 5 * 86400000, stage: 1, lastReview: Date.now() - 2 * 86400000 },
  ]);
  const addError = (e) => setErrors((prev) => [...prev, e]);
  const markReviewed = (id) => setErrors((prev) => prev.map((e) => e.id === id ? { ...e, stage: Math.min(e.stage + 1, REVIEW_INTERVALS.length - 1), lastReview: Date.now() } : e));

  const [simDay, setSimDay] = useState(0);
  const advanceDay = () => setSimDay((d) => d + 1);

  const handleBlitzRound = (correct) => setBlitzStats((s) => ({ correct: s.correct + (correct ? 1 : 0), total: s.total + 1 }));
  const handleSprintResult = (id, solved) => {
    setSprintStats((s) => ({ solved: s.solved + (solved ? 1 : 0), missed: s.missed + (solved ? 0 : 1) }));
    if (!solved) {
      const q = DEEP_FOCUS_BANK.find((d) => d.id === id);
      addError({ id: `sprint-${Date.now()}`, desc: `Couldn't crack an 8-min sprint: ${q ? q.prompt.slice(0, 60) + "…" : "advanced problem"}`, chapter: q?.subject || "Mixed", category: "Slow Speed", createdAt: Date.now(), stage: 0, lastReview: Date.now() });
    }
  };
  const handleDistraction = () => setDistractionCount((d) => d + 1);
  const handleSessionEnd = () => {};

  const elasticity = useMemo(() => {
    const blitzAcc = blitzStats.total ? blitzStats.correct / blitzStats.total : 0.5;
    const base = 480;
    const blitzBonus = Math.round(blitzAcc * 220);
    const sprintBonus = sprintStats.solved * 35;
    const sprintPenalty = sprintStats.missed * 8;
    const distractionPenalty = distractionCount * 15;
    const streakBonus = streak * 6;
    const score = base + blitzBonus + sprintBonus + streakBonus - sprintPenalty - distractionPenalty;
    return Math.max(0, Math.min(999, Math.round(score)));
  }, [blitzStats, sprintStats, distractionCount, streak]);

  const dueCount = useMemo(() => {
    const nowSim = Date.now() + simDay * 86400000;
    return errors.filter((e) => e.lastReview + REVIEW_INTERVALS[Math.min(e.stage, REVIEW_INTERVALS.length - 1)] * 86400000 <= nowSim).length;
  }, [errors, simDay]);

  const targetDate = new Date("2028-05-25T09:00:00");
  const daysLeft = Math.max(0, Math.ceil((targetDate.getTime() - Date.now()) / 86400000));
  const stats = { completedByPhaseSubject };

  return (
    <div style={{ minHeight: "100vh", background: "#05070A", display: "flex", justifyContent: "center", ...fontBody }}>
      <div style={{ width: "100%", maxWidth: 430, minHeight: "100vh", background: T.bg, display: "flex", flexDirection: "column", position: "relative", boxShadow: "0 0 60px rgba(0,0,0,0.5)" }}>
        <div style={{ padding: "14px 16px 0" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Sparkles size={16} color={T.amber} />
            <span style={{ ...fontDisplay, fontSize: 15, fontWeight: 700, color: T.text }}>Command Deck</span>
            <span style={{ ...fontMono, fontSize: 9.5, color: T.textFaint, marginLeft: "auto" }}>CLASS 11 → JEE ADV 2028</span>
          </div>
        </div>

        <TickerBar daysLeft={daysLeft} elasticity={elasticity} streak={streak} dueCount={dueCount} />

        <div style={{ display: "flex", gap: 6, padding: "10px 16px 0", overflowX: "auto" }}>
          {PHASES.map((p) => (
            <button key={p.id} onClick={() => setCurrentPhaseId(p.id)} style={{
              ...fontMono, fontSize: 10, whiteSpace: "nowrap", padding: "6px 10px", borderRadius: 8, cursor: "pointer",
              background: currentPhaseId === p.id ? p.color : "transparent",
              color: currentPhaseId === p.id ? T.bg : T.textFaint,
              border: `1px solid ${currentPhaseId === p.id ? p.color : T.border}`,
            }}>{p.tag}</button>
          ))}
        </div>

        <div style={{ flex: 1, overflowY: "auto", paddingBottom: 8 }}>
          {tab === "dashboard" && <Dashboard phase={phase} elasticity={elasticity} stats={stats} checklist={checklist} setChecklist={setChecklist} streak={streak} dueCount={dueCount} />}
          {tab === "roadmap" && <Roadmap stats={stats} toggleChapterDone={toggleChapterDone} />}
          {tab === "gym" && <BrainGym onBlitzRound={handleBlitzRound} onSprintResult={handleSprintResult} />}
          {tab === "errors" && <ErrorLog errors={errors} addError={addError} markReviewed={markReviewed} />}
          {tab === "alerts" && <Alerts errors={errors} markReviewed={markReviewed} onDistraction={handleDistraction} onSessionEnd={handleSessionEnd} simDay={simDay} advanceDay={advanceDay} />}
        </div>

        <BottomNav tab={tab} setTab={setTab} dueCount={dueCount} />
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

      });

</body>
